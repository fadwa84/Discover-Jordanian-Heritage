<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Discover Jordanian Heritage</title>
  <style>
    body {font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f6; margin: 0;}
    .centered {min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;}
    h1 {font-size: 2.2rem; color:#555; letter-spacing: 1.2px; margin-bottom: 13px;}
    .desc {max-width: 500px; background: #fafafa; color: #444; border-radius: 14px; padding: 18px 22px; margin-bottom: 24px; text-align:center; font-size:1.12rem;}
    .main-btn {padding: 13px 33px; margin: 10px; border-radius: 13px; border: none; background: #888; color: #fff; font-size: 1.14rem; cursor: pointer;}
    .main-btn.secondary {background: #fff; color: #888; border:1.5px solid #bbb;}
    .sub-link {margin-top:16px; font-size:0.99rem; color:#aaa;}
  </style>
</head>
<body>
  <div class="centered">
    <h1>Discover Jordanian Heritage</h1>
    <div class="desc">
      Welcome! This interactive research tool lets you discover iconic Jordanian heritage patterns and see how they decorate different products.<br>
      Click "Start" to begin exploring.
    </div>
    <button class="main-btn" onclick="window.location.href='main.html'">Start</button>
    <button class="main-btn secondary" onclick="window.location.href='symbols.html'">Symbols Guide</button>
    <div class="sub-link">Designed for academic research</div>
  </div>
</body>
</html>
